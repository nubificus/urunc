---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: urunc-deploy
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: urunc-deploy
  template:
    metadata:
      labels:
        name: urunc-deploy
    spec:
      serviceAccountName: urunc-deploy-sa
      # terminationGracePeriodSeconds: 60
      hostPID: true
      containers:
        - name: kube-urunc
          image: harbor.nbfc.io/nubificus/urunc/urunc-deploy:fix_ns_net
          imagePullPolicy: Always
          lifecycle:
            preStop:
              exec:
                command: ["bash", "-c", "/urunc-artifacts/scripts/install.sh cleanup"]
          command: ["bash", "-c", "/urunc-artifacts/scripts/install.sh install"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HYPERVISORS
              value: "firecracker qemu solo5-hvt solo5-spt"
            - name: DEBUG
              value: "false"
          securityContext:
            privileged: true
          volumeMounts:
            - name: crio-conf
              mountPath: /etc/crio/
            - name: containerd-conf
              mountPath: /etc/containerd/
            - name: host
              mountPath: /host/
      volumes:
        - name: crio-conf
          hostPath:
            path: /etc/crio/
        - name: containerd-conf
          hostPath:
            path: /etc/containerd/
        - name: host
          hostPath:
            path: /
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate